<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Pipeline Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
        }
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00d4ff;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            text-align: center;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        🛰️ Loading Cosmic Pipeline Dashboard...<br>
        <small style="color: #00ff88;">Please wait...</small>
    </div>
    <iframe src="http://localhost:8501" onload="document.getElementById('loading').style.display='none'"></iframe>
</body>
</html>
