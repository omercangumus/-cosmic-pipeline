# Default pipeline configuration for cosmic-pipeline

dsp_detector:
  zscore_threshold: 2.0
  sliding_window: 50
  sliding_window_threshold: 3.0
  max_gap_seconds: 60
  range_std_multiplier: 10.0

lstm_detector:
  model_path: "models/lstm_ae.pt"
  contamination: 0.05
  threshold_percentile: 95

ensemble:
  strategy: "hybrid"
  min_agreement: 2

classic_filter:
  median_window: 5

logging:
  level: "INFO"
