# Cosmic Pipeline — Default Configuration

dsp_detector:
  zscore_threshold: 3.0          # Z-score anomali esigi (3.0 = mean +/- 3 std)
  window: 50                     # Sliding window boyutu
  window_threshold: 3.0          # Sliding window anomali esigi
  max_gap_seconds: 60            # Maks izin verilen timestamp boslugu (saniye)
  range_std_multiplier: 10.0     # Fiziksel limit ihlali esigi (10 std = imkansiz deger)
  delta_multiplier: 5.0          # Ani sicrama esigi (5x median delta)
  iforest_contamination: 0.05    # Isolation Forest anomali orani (%5)

lstm_detector:
  model_path: "models/lstm_ae.pt"  # LSTM Autoencoder model dosyasi
  threshold_percentile: 95.0       # Reconstruction error esigi (95. yuzdede)

ensemble:
  strategy: "hybrid"             # Ensemble stratejisi (hybrid = hard + soft)
  min_agreement: 2               # Soft dedektorler arasi minimum anlasma

classic_filter:
  median_window: 7               # Median filtre pencere boyutu (tek sayi)

logging:
  level: "INFO"
