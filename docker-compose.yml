version: "3.9"

services:
  cosmic-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmic-pipeline-app
    ports:
      - "8501:8501"
    volumes:
      # LSTM model dosyası — commit edilmez, yerelden mount edilir
      - ./models:/app/models
      # GOES cache ve raw veri
      - ./data/cache:/app/data/cache
      - ./data/raw:/app/data/raw
      # Config dosyaları
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - cosmic-net

networks:
  cosmic-net:
    driver: bridge
